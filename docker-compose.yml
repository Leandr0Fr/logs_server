services:
  app:
    build: .
    container_name: logs_app
    restart: unless-stopped

    ports:
      - "8080:8080"

    env_file:
      - .env

    networks:
      - backend-network

  db:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: unless-stopped

    env_file:
      - .env

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - backend-network

  redis:
    image: redis:7-alpine
    container_name: redis_cache
    restart: unless-stopped

    command: redis-server --appendonly yes

    volumes:
      - redis_data:/data
    networks:
      - backend-network

networks:
  backend-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
